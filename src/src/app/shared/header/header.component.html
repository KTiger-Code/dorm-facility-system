<header class="home-header">
  <div class="logo-section">
    <img src="/Photo/Logo-icon.svg" class="logo-icon-img" alt="logo">
    <span class="logo-title">FACILITY AND SERVICE SYSTEM</span>
  </div>
  <div class="header-menu" *ngIf="showHeaderActions">
    <button class="hamburger-btn" (click)="toggleMenu()" [class.active]="isMenuOpen">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
    
    <!-- Dropdown Menu -->
    <div class="dropdown-menu" [class.show]="isMenuOpen">
      <div class="menu-content">
        <div class="menu-items">
          <a routerLink="/home" class="menu-item" (click)="closeMenu()">
            <i class="menu-icon">🏠</i>
            <div class="menu-text">
              <span class="menu-label">Home</span>
              <span class="menu-desc">หน้าหลัก</span>
            </div>
          </a>
          <button class="menu-item" (click)="onConnectLine()">
            <i class="menu-icon">📱</i>
            <div class="menu-text">
              <span class="menu-label">Connect Line</span>
              <span class="menu-desc">เชื่อมต่อไลน์</span>
            </div>
          </button>
          <a routerLink="/staff" class="menu-item" (click)="closeMenu()" *ngIf="isAdmin">
            <i class="menu-icon">👤</i>
            <div class="menu-text">
              <span class="menu-label">For Admin</span>
              <span class="menu-desc">จัดการระบบ</span>
            </div>
          </a>
          <button class="menu-item logout-item" (click)="onLogout()">
            <i class="menu-icon">🚪</i>
            <div class="menu-text">
              <span class="menu-label">Logout</span>
              <span class="menu-desc">ออกจากระบบ</span>
            </div>
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
<div class="home-divider"></div>
