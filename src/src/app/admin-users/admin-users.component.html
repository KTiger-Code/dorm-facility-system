<h2>👥 จัดการผู้ใช้งาน</h2>

<!-- ค้นหา -->
<label>
  🔍 ค้นหาชื่อหรือห้องพัก:
  <input [(ngModel)]="searchKeyword" placeholder="A101 หรือ ชื่อผู้ใช้">
</label>

<hr>

<!-- ฟอร์มสร้าง/แก้ไข -->
<h3 *ngIf="!isEdit">➕ สร้างผู้ใช้ใหม่</h3>
<h3 *ngIf=" isEdit">✏️ แก้ไขผู้ใช้</h3>

<form (ngSubmit)="submitForm()">
  <div>
    <label>Username:</label>
    <input [(ngModel)]="formModel.username" name="username" required>
  </div>
  <div>
    <label>Password:</label>
    <input type="password" [(ngModel)]="formModel.password" name="password" [required]="!isEdit">
    <small *ngIf="isEdit">(เว้นว่างถ้าไม่ต้องการเปลี่ยน)</small>
  </div>
  <div>
    <label>ชื่อ-นามสกุล:</label>
    <input [(ngModel)]="formModel.fullname" name="fullname" required>
  </div>
  <div>
    <label>ห้องพัก:</label>
    <input [(ngModel)]="formModel.room_number" name="room_number" required>
  </div>
  <div>
    <label>สิทธิ์:</label>
    <select [(ngModel)]="formModel.role" name="role">
      <option value="resident">Resident</option>
      <option value="admin">Admin</option>
    </select>
  </div>
  <button type="submit">{{ isEdit ? 'บันทึกการแก้ไข' : 'สร้างผู้ใช้' }}</button>
  <button type="button" (click)="startCreate()" *ngIf="isEdit">ยกเลิก</button>
</form>

<hr>

<!-- ตารางรายการ -->
<table>
  <thead>
    <tr>
      <th>ชื่อผู้ใช้</th><th>ชื่อ-นามสกุล</th><th>ห้อง</th><th>สิทธิ์</th><th>จัดการ</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let u of filteredUsers">
      <td>{{ u.username }}</td>
      <td>{{ u.fullname }}</td>
      <td>{{ u.room_number }}</td>
      <td>{{ u.role }}</td>
      <td>
        <button (click)="startEdit(u)">แก้ไข</button>
        <button (click)="deleteUser(u.id!)">ลบ</button>
      </td>
    </tr>
  </tbody>
</table>
