<h2>จัดการคำขอซ่อม (Admin)</h2>

<label>
  สถานะ:
  <select [(ngModel)]="filterStatus">
    <option value="all">ทั้งหมด</option>
    <option value="pending">รอดำเนินการ</option>
    <option value="in_progress">กำลังดำเนินการ</option>
    <option value="completed">เสร็จสิ้น</option>
  </select>
</label>

<table class="repair-table">
  <thead>
    <tr>
      <th>ห้อง</th>
      <th>หัวข้อ</th>
      <th>รายละเอียด</th>
      <th>สถานะ</th>
      <th>จัดการ</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let r of filteredRepairs()">
      <td>{{ r.room_number }}</td>
      <td>{{ r.title }}</td>
      <td>{{ r.description }}</td>
      <td>
        <select
          [(ngModel)]="r.status"
          (ngModelChange)="updateStatus(r, $event)"
        >
          <option value="pending">รอดำเนินการ</option>
          <option value="in_progress">กำลังดำเนินการ</option>
          <option value="completed">เสร็จสิ้น</option>
        </select>
      </td>
      <td>
        <button (click)="deleteRepair(r.id)">🗑️</button>
      </td>
    </tr>
  </tbody>
</table>
